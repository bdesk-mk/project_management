<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税理士ワークシフトサロン｜管理ダッシュボード</title>
<style>
:root{--navy:#1F2D3D;--gold:#A88B47;--rose:#A85569;--blue:#4A6FA5;--bg:#F4F8FB;--ink:#2B3440;--mute:#6B7886;--line:#E2E8EE;--red:#C0392B;--amber:#B9770E;--green:#2E7D57;}
*{box-sizing:border-box;}
body{margin:0;font-family:"Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px;}
header.top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
h1{font-size:22px;margin:0;color:var(--navy);}
.sub{color:var(--mute);font-size:12.5px;margin-top:3px;}
.today{font-size:13px;color:var(--navy);font-weight:bold;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;}
.chips{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 12px;}
.chip{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:96px;text-align:center;}
.chip .n{font-size:20px;font-weight:bold;display:block;line-height:1.1;}
.chip .l{font-size:11px;color:var(--mute);}
.chip.red .n{color:var(--red);}.chip.green .n{color:var(--green);}.chip.amber .n{color:var(--amber);}.chip.navy .n{color:var(--navy);}
.alarm{background:#FDEDEC;border:1px solid #E6B0AA;color:var(--red);border-radius:10px;padding:11px 15px;margin-bottom:14px;font-weight:bold;display:flex;align-items:center;gap:10px;cursor:pointer;}
.alarm.hidden{display:none;}
.alarm .go{margin-left:auto;font-size:12px;background:var(--red);color:#fff;border:none;border-radius:6px;padding:6px 11px;cursor:pointer;}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.views{display:flex;gap:6px;flex-wrap:wrap;}
.vbtn{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:bold;}
.vbtn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
select,input[type=search]{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;background:#fff;}
input[type=search]{min-width:150px;}
.toggle{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--mute);cursor:pointer;user-select:none;}
.spacer{flex:1;}
.subtabs{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:0 2px 16px;}
.subtabs.hidden{display:none;}
.subtabs .lbl{font-size:12px;color:var(--mute);margin-right:2px;}
.stab{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:20px;padding:6px 15px;cursor:pointer;font-size:12.5px;font-weight:bold;}
.stab.active{background:var(--gold);color:#fff;border-color:var(--gold);}
.group{margin-bottom:20px;}
.ghead{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.ghead h2{font-size:15.5px;margin:0;color:var(--navy);}
.gcount{font-size:12px;color:var(--mute);}
.pbar{flex:1;height:8px;background:#EAEFF4;border-radius:5px;overflow:hidden;max-width:280px;}
.pbar>i{display:block;height:100%;background:var(--green);border-radius:5px;}
.row{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:9px;padding:10px 13px;margin-bottom:7px;}
.row.done{opacity:.55;}
.row.done .name{text-decoration:line-through;}
.row.overdue{background:#FDEDEC;border-color:#E6B0AA;}
.row.soon{background:#FEF6E7;border-color:#F0D090;}
.row.cat-prod{border-left-color:var(--blue);}
.row.cat-mkt{border-left-color:var(--gold);}
.row.cat-cs{border-left-color:var(--rose);}
.row.cat-ops{border-left-color:var(--navy);}
.cb{margin-top:2px;width:19px;height:19px;flex:none;cursor:pointer;accent-color:var(--green);}
.rmain{flex:1;min-width:0;}
.name{font-weight:bold;font-size:14px;line-height:1.35;}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;align-items:center;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;color:#fff;white-space:nowrap;}
.b-prod{background:var(--blue);}.b-mkt{background:var(--gold);}.b-cs{background:var(--rose);}.b-ops{background:var(--navy);}
.owner{font-size:12px;color:var(--navy);background:#EEF3F8;border-radius:20px;padding:2px 9px;}
.date{font-size:12px;color:var(--mute);}
.date.warn{color:var(--red);font-weight:bold;}
.date.amber{color:var(--amber);font-weight:bold;}
.pill{font-size:11px;padding:2px 8px;border-radius:5px;background:#EDEDED;color:#555;}
.pill.hold{background:#DCD3C0;color:#5b4b2a;}.pill.tbd{background:#F0E8E0;color:#7a5c2a;}
.note{font-size:11.5px;color:var(--mute);margin-top:4px;}
.editbtn{border:1px solid var(--line);background:#fff;color:var(--mute);cursor:pointer;font-size:11.5px;padding:4px 8px;border-radius:7px;flex:none;align-self:center;}
.editbtn:hover{color:var(--navy);border-color:var(--navy);}
.empty{color:var(--mute);text-align:center;padding:30px;}
.gantt{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:#fff;}
.ginner{min-width:1060px;}
.grow{display:grid;grid-template-columns:262px repeat(20,1fr);}
.gname{position:sticky;left:0;background:#fff;z-index:2;padding:7px 10px;border-right:1px solid var(--line);border-bottom:1px solid #EEF1F4;display:flex;flex-direction:column;gap:2px;}
.gname b{font-weight:bold;color:var(--ink);font-size:12px;line-height:1.25;}
.gname span{color:var(--mute);font-size:10.5px;}
.gcell{border-right:1px solid #EEF1F4;border-bottom:1px solid #EEF1F4;min-height:33px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--rose);font-weight:bold;}
.gh{background:var(--navy);color:#fff;font-size:9.5px;text-align:center;font-weight:bold;line-height:1.15;padding:5px 0;position:sticky;top:0;z-index:3;}
.gname.gh{z-index:4;justify-content:center;font-size:11.5px;}
.gcat{color:#fff;font-weight:bold;padding:5px 11px;font-size:12.5px;grid-column:1/-1;}
.gtoday{box-shadow:inset 2px 0 0 0 #C0392B;}
.gnote{font-size:11.5px;color:var(--mute);padding:9px 4px 0;}
footer{margin-top:24px;color:var(--mute);font-size:11.5px;border-top:1px solid var(--line);padding-top:12px;}
.legend{display:flex;gap:16px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
button.mini{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--navy);}
button.mini.accent{background:var(--gold);color:#fff;border-color:var(--gold);}
.modal{position:fixed;inset:0;background:rgba(20,30,45,.45);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal.hidden{display:none;}
.mbox{background:#fff;border-radius:12px;padding:20px 22px;width:min(520px,92vw);max-height:90vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.mbox h3{margin:0 0 14px;color:var(--navy);}
.mbox label{display:block;font-size:12px;color:var(--mute);margin-bottom:11px;}
.mbox input,.mbox select,.mbox textarea{width:100%;margin-top:4px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ink);}
.mbox textarea{min-height:50px;resize:vertical;}
.mrow{display:flex;gap:12px;}.mrow label{flex:1;}
.mbtns{display:flex;gap:8px;align-items:center;margin-top:6px;}
.mini.save{background:var(--navy);color:#fff;border-color:var(--navy);}
.mini.del{background:#fff;color:var(--red);border-color:#E6B0AA;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>税理士ワークシフトサロン｜管理ダッシュボード</h1>
      <div class="sub">プロジェクト管理ガントチャート v3 連動 ／ 完了チェック・編集はこのブラウザに保存されます</div>
      <div class="sub" id="syncBadge">🖥 保存先：この端末内（未同期）</div>
    </div>
    <div class="today" id="today"></div>
  </header>

  <div class="chips" id="chips"></div>
  <div class="alarm hidden" id="alarm"><span id="alarmText"></span><button class="go" id="alarmGo">遅延を表示 ▸</button></div>

  <div class="controls">
    <div class="views" id="views">
      <button class="vbtn active" data-v="project">プロジェクト別</button>
      <button class="vbtn" data-v="owner">担当者別</button>
      <button class="vbtn" data-v="day">日別</button>
      <button class="vbtn" data-v="month">月別</button>
      <button class="vbtn" data-v="all">全タスク</button>
      <button class="vbtn" data-v="gantt">ガント（全体）</button>
    </div>
    <span class="spacer"></span>
    <select id="ownerFilter"><option value="">担当者：すべて</option></select>
    <input type="search" id="search" placeholder="タスク検索…">
    <label class="toggle"><input type="checkbox" id="hideDone"> 完了を隠す</label>
    <label class="toggle"><input type="checkbox" id="overdueOnly"> 遅延のみ</label>
  </div>
  <div class="controls" style="margin-top:-4px">
    <button class="mini accent" id="addBtn">＋ タスク追加</button>
    <button class="mini" id="exportBtn">変更を書き出し(JSON)</button>
    <button class="mini" id="copyBtn">変更をコピー</button>
    <button class="mini" id="editResetBtn">編集を破棄</button>
    <span class="spacer"></span>
    <button class="mini" id="printBtn">印刷</button>
    <button class="mini" id="resetBtn">チェック全解除</button>
  </div>

  <div class="subtabs hidden" id="subtabs"></div>
  <div id="board"></div>

  <footer>
    <div class="legend">
      <span><span class="dot" style="background:#4A6FA5"></span>プロダクト</span>
      <span><span class="dot" style="background:#A88B47"></span>マーケティング</span>
      <span><span class="dot" style="background:#A85569"></span>カスタマーサクセス</span>
      <span><span class="dot" style="background:#1F2D3D"></span>オペレーション</span>
      <span><span class="dot" style="background:#FDEDEC;border:1px solid #E6B0AA"></span>遅延</span>
      <span><span class="dot" style="background:#FEF6E7;border:1px solid #F0D090"></span>3日以内</span>
    </div>
    <div style="margin-top:6px">各行の「✏️編集」で内容・期限を修正、「＋タスク追加」で新規追加できます。編集はこのブラウザに保存されます。ガント本体(xlsx)へ反映したい時は「変更をコピー」してご連絡ください。</div>
  </footer>
</div>

<div class="modal hidden" id="modal"><div class="mbox">
  <h3 id="mtitle">タスク編集</h3>
  <label>タスク名<textarea id="m_name"></textarea></label>
  <label>担当<input id="m_owner" placeholder="例：倉岡・石井"></label>
  <div class="mrow">
    <label>カテゴリ<select id="m_cat"><option value="prod">プロダクト</option><option value="mkt">マーケティング・新規獲得</option><option value="cs">カスタマーサクセス</option><option value="ops">オペレーション</option></select></label>
    <label>種別<select id="m_status"><option value="active">期日あり</option><option value="保留">保留</option><option value="TBD">TBD</option></select></label>
  </div>
  <div class="mrow">
    <label>開始日<input type="date" id="m_start"></label>
    <label>期限<input type="date" id="m_due"></label>
  </div>
  <label>備考<input id="m_note"></label>
  <div class="mbtns">
    <button class="mini del" id="m_delete">削除</button>
    <span class="spacer"></span>
    <button class="mini" id="m_cancel">キャンセル</button>
    <button class="mini save" id="m_save">保存</button>
  </div>
</div></div>

  }else if(state.view==='day'){html+=byDay(its);
  }else if(state.view==='month'){
    if(state.sub==='all'){monthsPresent().forEach(m=>{const arr=its.filter(i=>i.due&&monthOf(i.due)===m);if(arr.length)html+=groupBlock(m+'月','<span class="dot" style="background:'+catColor('ops')+'"></span>',arr);});
      const nod=its.filter(i=>!i.due);if(nod.length)html+=groupBlock('継続・期日なし','',nod);
    }else html+=byDay(its);
  }else html+=groupBlock('全タスク（期日順）','',its);
  board.innerHTML=html;
  updateChips();
}
function updateChips(){
  const all=ITEMS, act=all.filter(i=>i.status==='active'), dn=act.filter(i=>done[i.id]).length;
  const ov=all.filter(isOverdue).length, soon=all.filter(isSoon).length, hold=all.filter(i=>i.status!=='active').length;
  document.getElementById('chips').innerHTML=
   chip(act.length,'対象タスク','navy')+chip(dn,'完了','green')+chip(act.length-dn,'未完了','navy')
   +chip(ov,'遅延','red')+chip(soon,'3日以内','amber')+chip(hold,'保留・TBD','navy');
  const al=document.getElementById('alarm');
  if(ov>0){al.classList.remove('hidden');document.getElementById('alarmText').textContent='⚠ 遅延タスクが '+ov+' 件あります（未完了・期限超過）';}
  else al.classList.add('hidden');
}
function chip(n,l,c){return '<div class="chip '+c+'"><span class="n">'+n+'</span><span class="l">'+l+'</span></div>';}

// ---- edit modal ----
function openModal(id){
  editingId=id; const it=id?ITEMS.find(x=>String(x.id)===String(id)):null;
  document.getElementById('mtitle').textContent=id?'タスク編集':'タスク追加';
  document.getElementById('m_name').value=it?it.name:'';
  document.getElementById('m_owner').value=it?(it.owner||''):'';
  document.getElementById('m_cat').value=it?it.cat:'ops';
  document.getElementById('m_status').value=it?it.status:'active';
  document.getElementById('m_start').value=it&&it.start?it.start:'';
  document.getElementById('m_due').value=it&&it.due?it.due:'';
  document.getElementById('m_note').value=it?(it.note||''):'';
  document.getElementById('m_delete').style.display=id?'':'none';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');editingId=null;}
function saveModal(){
  const name=document.getElementById('m_name').value.trim();
  if(!name){alert('タスク名を入力してください');return;}
  const status=document.getElementById('m_status').value;
  let start=document.getElementById('m_start').value||null, due=document.getElementById('m_due').value||null;
  if(status!=='active'){start=null;due=null;} else if(!start&&due){start=due;}
  const kind=(start&&due&&start!==due)?'span':'milestone';
  const obj={name,owner:document.getElementById('m_owner').value.trim(),cat:document.getElementById('m_cat').value,
             status,start,due,kind,note:document.getElementById('m_note').value.trim()};
  if(editingId){
    if(String(editingId).startsWith('a')){const a=edits.add.find(x=>String(x.id)===String(editingId));Object.assign(a,obj);}
    else edits.ov[String(editingId)]=obj;
  }else{obj.id='a'+Date.now();edits.add.push(obj);}
  saveEdits();rebuildItems();closeModal();render();
}
function deleteTask(){
  if(!editingId)return; if(!confirm('このタスクを削除しますか？'))return;
  if(String(editingId).startsWith('a'))edits.add=edits.add.filter(x=>String(x.id)!==String(editingId));
  else{edits.del.push(String(editingId));delete edits.ov[String(editingId)];}
  saveEdits();rebuildItems();closeModal();render();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(ITEMS,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='tasks_export_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
}
function changeText(){
  const L=['# ガント変更サマリー '+new Date().toLocaleString('ja-JP')];
  (edits.add||[]).forEach(a=>L.push('【追加】'+a.name+'｜担当:'+(a.owner||'—')+'｜'+CATLABEL[a.cat]+'｜期限:'+(a.due||'—')+(a.note?'｜備考:'+a.note:'')));
  Object.keys(edits.ov||{}).forEach(id=>{const b=DATA.items.find(i=>String(i.id)===id)||{};const o=edits.ov[id];
    L.push('【変更】'+(b.name||'')+' → 名:'+o.name+'｜担当:'+(o.owner||'—')+'｜'+CATLABEL[o.cat]+'｜期限:'+(o.due||'—'));});
  (edits.del||[]).forEach(id=>{const b=DATA.items.find(i=>String(i.id)===String(id));L.push('【削除】'+(b?b.name:id));});
  if(L.length===1)L.push('(変更はありません)');
  return L.join('\n');
}

document.getElementById('views').addEventListener('click',e=>{if(e.target.dataset.v){state.view=e.target.dataset.v;state.sub='all';localStorage.setItem(LSVIEW,state.view);render();}});
document.getElementById('subtabs').addEventListener('click',e=>{if(e.target.dataset.k!==undefined){state.sub=e.target.dataset.k;render();}});
document.getElementById('board').addEventListener('click',e=>{const eb=e.target.closest('[data-edit]');if(eb)openModal(eb.dataset.edit);});
document.getElementById('board').addEventListener('change',e=>{if(e.target.classList.contains('cb')){const id=e.target.dataset.id;if(e.target.checked)done[id]=true;else delete done[id];saveDone();render();}});
ownerSel.addEventListener('change',e=>{state.owner=e.target.value;render();});
document.getElementById('search').addEventListener('input',e=>{state.q=e.target.value;render();});
document.getElementById('hideDone').addEventListener('change',e=>{state.hideDone=e.target.checked;render();});
document.getElementById('overdueOnly').addEventListener('change',e=>{state.overdueOnly=e.target.checked;render();});
document.getElementById('alarmGo').addEventListener('click',()=>{state.overdueOnly=true;document.getElementById('overdueOnly').checked=true;state.view='day';state.sub='all';render();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('完了チェックをすべて解除しますか？')){done={};saveDone();render();}});
document.getElementById('addBtn').addEventListener('click',()=>openModal(null));
document.getElementById('exportBtn').addEventListener('click',exportJSON);
document.getElementById('copyBtn').addEventListener('click',()=>{const t=changeText();navigator.clipboard.writeText(t).then(()=>alert('変更サマリーをコピーしました。倉岡さんへ／AIへ貼り付けて共有できます。')).catch(()=>{prompt('コピーできませんでした。手動でコピーしてください：',t);});});
document.getElementById('editResetBtn').addEventListener('click',()=>{if(confirm('このブラウザの編集内容（追加・変更・削除）をすべて破棄し、元のガントに戻しますか？')){edits={ov:{},add:[],del:[]};saveEdits();rebuildItems();render();}});
document.getElementById('m_save').addEventListener('click',saveModal);
document.getElementById('m_cancel').addEventListener('click',closeModal);
document.getElementById('m_delete').addEventListener('click',deleteTask);
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

let _cloudRef=null, _applying=false;
function pushCloud(){ if(_cloudRef && !_applying){ try{ _cloudRef.set({done:done,edits:edits,updated:Date.now()}); }catch(e){} } }
function setBadge(t,c){ const b=document.getElementById('syncBadge'); if(b){ b.textContent=t; b.style.color=c||''; } }
function initCloud(){
  if(!window.FIREBASE_CONFIG || typeof firebase==='undefined'){ setBadge('🖥 保存先：この端末内（未同期）'); return; }
  try{
    firebase.initializeApp(window.FIREBASE_CONFIG);
    _cloudRef=firebase.database().ref('rooms/'+(window.SYNC_ROOM||'default'));
    setBadge('☁ チーム同期：接続中…','#B9770E');
    _cloudRef.on('value',function(snap){
      const v=snap.val();
      if(v){ _applying=true; done=v.done||{}; edits=v.edits||{ov:{},add:[],del:[]};
        localStorage.setItem(LSKEY,JSON.stringify(done)); localStorage.setItem(LSEDIT,JSON.stringify(edits));
        rebuildItems(); render(); _applying=false;
      } else { pushCloud(); }
      setBadge('☁ チーム同期：オン（全端末で共有）','#2E7D57');
    }, function(err){ setBadge('⚠ 同期エラー：Firebase設定/ルールを確認','#C0392B'); });
  }catch(e){ setBadge('⚠ 同期の初期化に失敗','#C0392B'); }
}
rebuildItems();render();initCloud();
</script>
